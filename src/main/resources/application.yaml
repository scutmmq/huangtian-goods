spring:
  aop:
    proxy-target-class: true
  application:
    name: online-mall-application
  profiles:
    active: dev

server:
  port: 8080

mybatis-plus:
  mapper-locations: classpath*:com/scutmmq/mapper/**/*.xml
  type-aliases-package: com.scutmmq.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.CompositeEnumTypeHandler
aliyun:
  oss:
    endpoint: https://oss-cn-beijing.aliyuncs.com
    bucketName: web-management-ai
    region: cn-beijing

ai:
  api:
    key: "${AI_API_KEY:}"
    url: "${AI_API_URL:https://api.deepseek.com/chat/completions}"
    model: "${AI_API_MODEL:deepseek-chat}"
    auth-header: "${AI_API_AUTH_HEADER:Authorization}"
    auth-scheme: "${AI_API_AUTH_SCHEME:Bearer}"
  assistant:
    max-history-messages: 20
    draft-expire-minutes: 15
